# Notes:
# - Indonesia uses a civil law system heavily influenced by Dutch colonial law (Burgerlijk
#   Wetboek) with elements of customary law (adat) and Islamic law
# - The hierarchy of Indonesian legislation (per UU No. 12/2011 on Formation of Legislation):
#   1. UUD 1945 (Constitution), 2. TAP MPR, 3. UU/Perpu (Laws/Emergency Laws),
#   4. PP (Government Regulations), 5. Perpres (Presidential Regulations),
#   6. Provincial Regulations, 7. District/City Regulations
# - UU No. 27/2022 (PDP Law - Perlindungan Data Pribadi) is Indonesia's comprehensive
#   personal data protection law, heavily influenced by the EU GDPR; enacted 17 October 2022
#   with a 2-year transition period ending October 2024
# - The PDP supervisory institution is still being established as of 2026; interim enforcement
#   is handled by the Ministry of Communication and Informatics (Kominfo)
# - UU No. 11/2008 (ITE Law) as amended by UU No. 19/2016 covers electronic information,
#   transactions, and cybercrimes; widely used for content moderation enforcement
# - PP No. 71/2019 governs the operation of electronic systems and electronic transactions,
#   including data localization requirements for public electronic systems
# - Indonesia is the largest economy in ASEAN with 270M+ people; rapidly digitalizing
# - Bahasa Indonesia is the legally binding language; English translations are unofficial
# - Indonesia participates in the ASEAN Framework on Personal Data Protection
